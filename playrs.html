<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>playrs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;800;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root{
            --red:#CE1126;
            --red-dark:#8f0c1a;
            --black:#121212;
            --gold:#D4AF37;
            --gold-soft:#f1d98b;
            --cream:#F3ECDD;
            --white:#ffffff;
        }
        *{box-sizing:border-box;}
        body{
            margin:0;
            min-height:100vh;
            background:
                linear-gradient(180deg, rgba(0,0,0,.88), rgba(0,0,0,.88)),
                repeating-linear-gradient(135deg, #1c1c1c 0 40px, #161616 40px 80px);
            color:var(--cream);
            font-family:'Tajawal', sans-serif;
            text-align:center;
            line-height:1.7;
            padding-bottom:3rem;
        }
        body::before{
            content:"";
            display:block;
            height:10px;
            background:linear-gradient(90deg,var(--black) 0 33.3%, var(--white) 33.3% 66.6%, var(--red) 66.6% 100%);
        }
        h1{
            font-family:'Cairo', sans-serif;
            font-weight:800;
            font-size:clamp(1.5rem,4vw,2.2rem);
            color:var(--gold-soft);
            margin:2rem auto .8rem;
            padding:0 1rem;
            text-shadow:0 2px 12px rgba(0,0,0,.6);
        }
        hr{
            border:none;
            height:2px;
            width:min(90%,700px);
            margin:1.6rem auto 2rem;
            background:linear-gradient(90deg, transparent, var(--gold), transparent);
        }
        table{
            border-collapse:collapse;
            margin:0 auto 2rem;
            background:rgba(255,255,255,.04);
            border:2px solid var(--gold);
            border-radius:12px;
            overflow:hidden;
            width:min(96%,900px);
            box-shadow:0 12px 32px rgba(0,0,0,.55);
        }
        th, td{
            padding:.8rem 1rem;
            border:1px solid rgba(212,175,55,.3);
            font-family:'Tajawal', sans-serif;
            color:var(--cream);
            text-align:center;
        }
        th{
            background:var(--red-dark);
            color:var(--gold-soft);
            font-family:'Cairo', sans-serif;
            font-weight:700;
        }
        tr:nth-child(even) td{
            background:rgba(255,255,255,.035);
        }
        img{
            border-radius:10px;
            border:2px solid var(--gold);
            box-shadow:0 4px 12px rgba(0,0,0,.5);
        }
    </style>
</head>
<body>
    <h1>لاعبيين الهجوم</h1><hr>

    <table border="2px">
        <tr>
        <th>اسم اللاعب</th>
        <th>عمر اللعب </th>
        <th>طول اللاعب</th>
        <th>نادي اللاعب</th>
        <th>صوره اللاعب</th>
        </tr>
        <tr>
        <td>محمد صلاح</td>
        <td>34 عام</td>
        <td>175 cm</td>
        <td>ليفر بول  (سينتقل قريب)</td>
        <td><img src="img/mo.jpg" alt="salah" width="70"></td>
        </tr>
        <tr> 
        <td>مصطفى زيكو</td>
        <td>29 عام</td>
        <td>179 cm</td>
        <td>بيراميدز المصري</td>
        <td><img src="img/zeko.jpg" alt="zeko"width="60" ></td>
        </tr>
        <tr>
        <td>امام عاشور</td>
        <td>28 عام</td>
        <td>180cm</td>
        <td>الاهلي المصري</td>
        <td><img src="img/emo.jpg" alt="emo" width="60"></td>
        </tr>
        <tr>
        <td>محمود تريزيجيه</td>
        <td>31 عام</td>
        <td>181cm</td>
        <td>الاهلي المصري</td>
        <td><img src="img/trezy.jpg" alt=" trezy" width="60"></td>
        </tr>
        <tr>
        <td>عمر مرموش</td>
        <td>27 عام</td>
        <td>183 cm</td>
        <td>مان سيتي الانجليزي</td>
        <td><img src="img/marmosh.jpg" alt="marmosh" width="80"></td>
        </tr>
    </table>
</body>
</html>
