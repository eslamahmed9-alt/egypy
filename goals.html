<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>goals</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;800;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root{
            --red:#CE1126;
            --red-dark:#8f0c1a;
            --black:#121212;
            --gold:#D4AF37;
            --gold-soft:#f1d98b;
            --cream:#F3ECDD;
            --white:#ffffff;
        }
        *{box-sizing:border-box;}
        body{
            margin:0;
            min-height:100vh;
            background:
                linear-gradient(180deg, rgba(0,0,0,.88), rgba(0,0,0,.88)),
                repeating-linear-gradient(135deg, #1c1c1c 0 40px, #161616 40px 80px);
            color:var(--cream);
            font-family:'Tajawal', sans-serif;
            text-align:center;
            line-height:1.7;
            padding-bottom:3rem;
        }
        body::before{
            content:"";
            display:block;
            height:10px;
            background:linear-gradient(90deg,var(--black) 0 33.3%, var(--white) 33.3% 66.6%, var(--red) 66.6% 100%);
        }
        h1{
            font-family:'Cairo', sans-serif;
            font-weight:800;
            font-size:clamp(1.15rem,3vw,1.6rem);
            color:var(--gold-soft);
            margin:2rem auto .9rem;
            padding:0 1rem;
            text-shadow:0 2px 10px rgba(0,0,0,.6);
        }
        hr{
            border:none;
            height:2px;
            width:min(90%,600px);
            margin:1.8rem auto 2.2rem;
            background:linear-gradient(90deg, transparent, var(--gold), transparent);
        }
        video{
            border-radius:14px;
            border:3px solid var(--red);
            box-shadow:0 10px 28px rgba(0,0,0,.6);
            margin:.4rem 0 1.4rem;
            background:#000;
        }
    </style>
</head>
<body>
